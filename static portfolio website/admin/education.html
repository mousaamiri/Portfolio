<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<title>Admin — Education</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/css/style.css" />
<link rel="stylesheet" href="css/admin.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-main">
  <header class="admin-header">
    <button class="admin-hamburger" id="hamburgerBtn" aria-label="Toggle sidebar"><i data-lucide="menu"></i></button>
    <span class="admin-header-title">Education</span>
    <div class="admin-header-right"></div>
  </header>
  <main class="admin-content" id="crudContent"></main>
</div>

<div id="toastContainer" class="admin-toast-container"></div>
<div id="modalOverlay" class="admin-modal-overlay"><div class="admin-modal" id="modalContent"></div></div>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
(function () {
  "use strict";
  try { if (sessionStorage.getItem("admin_auth") !== "1") { window.location.replace("login.html"); return; } } catch(e) {}
  AdminSidebar.init("education");
  if (window.lucide) lucide.createIcons();

  AdminCRUD.init({
    entityName: "Education",
    title: "Education",
    subtitle: "Manage your educational background",
    store: AdminData.Education,
    searchKeys: ["institution_en", "institution_fa", "degree_en", "degree_fa"],
    columns: [
      {
        label: "Institution", key: "institution_en",
        render: function (e) {
          return '<div><div style="font-weight:600">' + AdminUtil.escapeHtml(e.institution_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(e.institution_fa) + '</div></div>';
        }
      },
      {
        label: "Degree", key: "degree_en",
        render: function (e) {
          return '<div><div>' + AdminUtil.escapeHtml(e.degree_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(e.degree_fa) + '</div></div>';
        }
      },
      {
        label: "Period", key: "startYear",
        render: function (e) { return e.startYear + ' — ' + (e.endYear || 'Present'); }
      },
      { label: "Score", key: "score" }
    ],
    formFields: [
      { key: "institution", label: "Institution", bilingual: true, required: true, placeholder: "University name" },
      { key: "degree", label: "Degree", bilingual: true, required: true, placeholder: "e.g. Bachelor of CS" },
      { key: "description", label: "Description", bilingual: true, type: "textarea", rows: 3, placeholder: "Description or achievements" },
      { type: "row", fields: [
        { key: "startYear", label: "Start Year", placeholder: "e.g. 2016", required: true },
        { key: "endYear", label: "End Year", placeholder: "e.g. 2020 (leave empty if current)" }
      ]},
      { key: "score", label: "Score / GPA", placeholder: "e.g. 18.5/20 or 3.8/4.0" }
    ]
  });
})();
</script>
</body>
</html>
