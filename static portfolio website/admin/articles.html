<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<title>Admin — Articles</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/css/style.css" />
<link rel="stylesheet" href="css/admin.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-main">
  <header class="admin-header">
    <button class="admin-hamburger" id="hamburgerBtn" aria-label="Toggle sidebar"><i data-lucide="menu"></i></button>
    <span class="admin-header-title">Articles</span>
    <div class="admin-header-right"></div>
  </header>
  <main class="admin-content" id="crudContent"></main>
</div>

<div id="toastContainer" class="admin-toast-container"></div>
<div id="modalOverlay" class="admin-modal-overlay"><div class="admin-modal" id="modalContent"></div></div>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
(function () {
  "use strict";
  try { if (sessionStorage.getItem("admin_auth") !== "1") { window.location.replace("login.html"); return; } } catch(e) {}
  AdminSidebar.init("articles");
  if (window.lucide) lucide.createIcons();

  AdminCRUD.init({
    entityName: "Article",
    title: "Articles",
    subtitle: "Manage your blog posts",
    store: AdminData.Articles,
    searchKeys: ["title_en", "title_fa", "excerpt_en", "excerpt_fa", "category"],
    columns: [
      {
        label: "Title", key: "title_en",
        render: function (a) {
          return '<div><div style="font-weight:600">' + AdminUtil.escapeHtml(a.title_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(a.title_fa) + '</div></div>';
        }
      },
      { label: "Category", key: "category" },
      {
        label: "Read Time", key: "readTime",
        render: function (a) { return a.readTime + ' min'; }
      },
      {
        label: "Status", key: "status",
        render: function (a) {
          var cls = a.status === "published" ? "admin-status--published" : "admin-status--draft";
          var txt = a.status === "published" ? "Published" : "Draft";
          return '<span class="admin-status ' + cls + '"><span class="admin-status-dot"></span>' + txt + '</span>';
        }
      }
    ],
    formFields: [
      { key: "title", label: "Title", bilingual: true, required: true, placeholder: "Article title" },
      { key: "excerpt", label: "Excerpt", bilingual: true, type: "textarea", rows: 2, placeholder: "Short summary" },
      { key: "body", label: "Body", bilingual: true, type: "textarea", rows: 6, placeholder: "Article content" },
      { type: "row", fields: [
        { key: "category", label: "Category", placeholder: "e.g. CSS, JavaScript" },
        { key: "readTime", label: "Read Time (min)", type: "number", min: 1, max: 120, placeholder: "8" }
      ]},
      { key: "tags", label: "Tags", type: "tags", placeholder: "Add tag and press Enter", hint: "Press Enter or comma to add" },
      { type: "row", fields: [
        { key: "publishDate", label: "Publish Date", type: "date" },
        { key: "status", label: "Status", type: "select", options: [
          { value: "published", label: "Published" },
          { value: "draft", label: "Draft" }
        ], defaultValue: "published" }
      ]}
    ]
  });
})();
</script>
</body>
</html>
