<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<title>Admin — Testimonials</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/css/style.css" />
<link rel="stylesheet" href="css/admin.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-main">
  <header class="admin-header">
    <button class="admin-hamburger" id="hamburgerBtn" aria-label="Toggle sidebar"><i data-lucide="menu"></i></button>
    <span class="admin-header-title">Testimonials</span>
    <div class="admin-header-right"></div>
  </header>
  <main class="admin-content" id="crudContent"></main>
</div>

<div id="toastContainer" class="admin-toast-container"></div>
<div id="modalOverlay" class="admin-modal-overlay"><div class="admin-modal" id="modalContent"></div></div>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
(function () {
  "use strict";
  try { if (sessionStorage.getItem("admin_auth") !== "1") { window.location.replace("login.html"); return; } } catch(e) {}
  AdminSidebar.init("testimonials");
  if (window.lucide) lucide.createIcons();

  AdminCRUD.init({
    entityName: "Testimonial",
    title: "Testimonials",
    subtitle: "Manage client testimonials",
    store: AdminData.Testimonials,
    searchKeys: ["name_en", "name_fa", "role_en", "role_fa", "quote_en", "quote_fa"],
    columns: [
      {
        label: "Name", key: "name_en",
        render: function (t) {
          return '<div><div style="font-weight:600">' + AdminUtil.escapeHtml(t.name_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(t.name_fa) + '</div></div>';
        }
      },
      {
        label: "Role", key: "role_en",
        render: function (t) {
          return '<div><div>' + AdminUtil.escapeHtml(t.role_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(t.role_fa) + '</div></div>';
        }
      },
      {
        label: "Quote", key: "quote_en",
        render: function (t) {
          return '<div style="max-width:300px"><div style="font-size:13px;color:var(--text-muted)">"' +
            AdminUtil.escapeHtml(AdminUtil.truncate(t.quote_en, 80)) + '"</div></div>';
        }
      }
    ],
    formFields: [
      { key: "name", label: "Name", bilingual: true, required: true, placeholder: "Full name" },
      { key: "role", label: "Role / Position", bilingual: true, placeholder: "e.g. CTO at Company" },
      { key: "quote", label: "Quote", bilingual: true, type: "textarea", rows: 4, required: true, placeholder: "Testimonial text" }
    ]
  });
})();
</script>
</body>
</html>
