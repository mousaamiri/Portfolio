<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<title>Admin — Projects</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/css/style.css" />
<link rel="stylesheet" href="css/admin.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-main">
  <header class="admin-header">
    <button class="admin-hamburger" id="hamburgerBtn" aria-label="Toggle sidebar"><i data-lucide="menu"></i></button>
    <span class="admin-header-title">Projects</span>
    <div class="admin-header-right"></div>
  </header>
  <main class="admin-content" id="crudContent"></main>
</div>

<div id="toastContainer" class="admin-toast-container"></div>
<div id="modalOverlay" class="admin-modal-overlay"><div class="admin-modal" id="modalContent"></div></div>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
(function () {
  "use strict";
  try { if (sessionStorage.getItem("admin_auth") !== "1") { window.location.replace("login.html"); return; } } catch(e) {}
  AdminSidebar.init("projects");
  if (window.lucide) lucide.createIcons();

  AdminCRUD.init({
    entityName: "Project",
    title: "Projects",
    subtitle: "Manage your portfolio projects",
    store: AdminData.Projects,
    searchKeys: ["title_en", "title_fa", "subtitle_en", "subtitle_fa"],
    columns: [
      {
        label: "Title", key: "title_en",
        render: function (p) {
          return '<div><div style="font-weight:600">' + AdminUtil.escapeHtml(p.title_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(p.title_fa) + '</div></div>';
        }
      },
      {
        label: "Technologies", key: "techs",
        render: function (p) {
          if (!p.techs || !p.techs.length) return '<span style="color:var(--text-faint)">—</span>';
          var shown = p.techs.slice(0, 3).map(function (t) {
            return '<span class="admin-tag" style="font-size:11px;padding:2px 7px">' + AdminUtil.escapeHtml(t) + '</span>';
          }).join('');
          if (p.techs.length > 3) shown += '<span style="font-size:11px;color:var(--text-faint)">+' + (p.techs.length - 3) + '</span>';
          return '<div style="display:flex;flex-wrap:wrap;gap:4px">' + shown + '</div>';
        }
      },
      {
        label: "Status", key: "status",
        render: function (p) {
          var cls = p.status === "published" ? "admin-status--published" : "admin-status--draft";
          var txt = p.status === "published" ? "Published" : "Draft";
          return '<span class="admin-status ' + cls + '"><span class="admin-status-dot"></span>' + txt + '</span>';
        }
      }
    ],
    formFields: [
      { key: "title", label: "Title", bilingual: true, required: true, placeholder: "Project name" },
      { key: "subtitle", label: "Short Description", bilingual: true, placeholder: "One-line description" },
      { key: "description", label: "Full Description", bilingual: true, type: "textarea", rows: 4, placeholder: "Detailed description" },
      { key: "techs", label: "Technologies", type: "tags", placeholder: "Add technology and press Enter", hint: "Press Enter or comma to add" },
      { type: "row", fields: [
        { key: "demoUrl", label: "Demo URL", placeholder: "https://..." },
        { key: "githubUrl", label: "GitHub URL", placeholder: "https://github.com/..." }
      ]},
      { key: "status", label: "Status", type: "select", options: [
        { value: "published", label: "Published" },
        { value: "draft", label: "Draft" }
      ], defaultValue: "published" }
    ]
  });
})();
</script>
</body>
</html>
