<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<title>Admin — Experiences</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/css/style.css" />
<link rel="stylesheet" href="css/admin.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-main">
  <header class="admin-header">
    <button class="admin-hamburger" id="hamburgerBtn" aria-label="Toggle sidebar"><i data-lucide="menu"></i></button>
    <span class="admin-header-title">Experiences</span>
    <div class="admin-header-right"></div>
  </header>
  <main class="admin-content" id="crudContent"></main>
</div>

<div id="toastContainer" class="admin-toast-container"></div>
<div id="modalOverlay" class="admin-modal-overlay"><div class="admin-modal" id="modalContent"></div></div>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
(function () {
  "use strict";
  try { if (sessionStorage.getItem("admin_auth") !== "1") { window.location.replace("login.html"); return; } } catch(e) {}
  AdminSidebar.init("experiences");
  if (window.lucide) lucide.createIcons();

  AdminCRUD.init({
    entityName: "Experience",
    title: "Experiences",
    subtitle: "Manage your work history",
    store: AdminData.Experiences,
    searchKeys: ["jobTitle_en", "jobTitle_fa", "company_en", "company_fa"],
    columns: [
      {
        label: "Job Title", key: "jobTitle_en",
        render: function (e) {
          return '<div><div style="font-weight:600">' + AdminUtil.escapeHtml(e.jobTitle_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(e.jobTitle_fa) + '</div></div>';
        }
      },
      {
        label: "Company", key: "company_en",
        render: function (e) {
          return '<div><div>' + AdminUtil.escapeHtml(e.company_en) + '</div>' +
            '<div class="admin-cell-sub">' + AdminUtil.escapeHtml(e.company_fa) + '</div></div>';
        }
      },
      {
        label: "Period", key: "startDate",
        render: function (e) {
          var end = e.isCurrent ? '<span style="color:var(--green);font-weight:600">Present</span>' : AdminUtil.escapeHtml(e.endDate);
          return AdminUtil.escapeHtml(e.startDate) + ' — ' + end;
        }
      }
    ],
    formFields: [
      { key: "jobTitle", label: "Job Title", bilingual: true, required: true, placeholder: "e.g. Senior Developer" },
      { key: "company", label: "Company", bilingual: true, required: true, placeholder: "e.g. Tech Corp" },
      { key: "description", label: "Description", bilingual: true, type: "textarea", rows: 4, placeholder: "Describe your responsibilities" },
      { type: "row", fields: [
        { key: "startDate", label: "Start Date", placeholder: "YYYY-MM", required: true },
        { key: "endDate", label: "End Date", placeholder: "YYYY-MM (leave empty if current)" }
      ]},
      { key: "isCurrent", label: "Employment Status", type: "checkbox", checkboxLabel: "I currently work here" }
    ]
  });
})();
</script>
</body>
</html>
