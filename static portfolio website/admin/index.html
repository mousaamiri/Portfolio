<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
<title>Admin — Dashboard</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/css/style.css" />
<link rel="stylesheet" href="css/admin.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-main">
  <header class="admin-header">
    <button class="admin-hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
      <i data-lucide="menu"></i>
    </button>
    <span class="admin-header-title">Dashboard</span>
    <div class="admin-header-right"></div>
  </header>
  <main class="admin-content" id="dashboardContent"></main>
</div>

<div id="toastContainer" class="admin-toast-container"></div>
<div id="modalOverlay" class="admin-modal-overlay"><div class="admin-modal" id="modalContent"></div></div>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
(function () {
  "use strict";
  try { if (sessionStorage.getItem("admin_auth") !== "1") { window.location.replace("login.html"); return; } } catch(e) {}
  AdminSidebar.init("index");
  if (window.lucide) lucide.createIcons();

  var stats = [
    { label: "Projects", count: AdminData.Projects.count(), icon: "folder-kanban", fg: "#f0a63b", bg: "rgba(240,166,59,0.12)", href: "projects.html" },
    { label: "Articles", count: AdminData.Articles.count(), icon: "file-text", fg: "#3b82f6", bg: "rgba(59,130,246,0.12)", href: "articles.html" },
    { label: "Experiences", count: AdminData.Experiences.count(), icon: "briefcase", fg: "#22c55e", bg: "rgba(34,197,94,0.12)", href: "experiences.html" },
    { label: "Education", count: AdminData.Education.count(), icon: "graduation-cap", fg: "#a855f7", bg: "rgba(168,85,247,0.12)", href: "education.html" },
    { label: "Skills", count: AdminData.Skills.count(), icon: "star", fg: "#14b8a6", bg: "rgba(20,184,166,0.12)", href: "skills.html" },
    { label: "Testimonials", count: AdminData.Testimonials.count(), icon: "quote", fg: "#ec4899", bg: "rgba(236,72,153,0.12)", href: "testimonials.html" },
    { label: "Messages", count: AdminData.Messages.count(), icon: "mail", fg: "#ef4444", bg: "rgba(239,68,68,0.12)", href: "messages.html", sub: AdminData.unreadMessages() + " unread" }
  ];

  var html = '<div class="admin-page-header"><div>';
  html += '<h1 class="admin-page-title">Dashboard</h1>';
  html += '<p class="admin-page-subtitle">Overview of your portfolio content</p>';
  html += '</div></div>';

  html += '<div class="admin-stats-grid">';
  stats.forEach(function (s) {
    html += '<a href="' + s.href + '" class="admin-stat-card">';
    html += '<div class="admin-stat-header"><span class="admin-stat-label">' + s.label + '</span>';
    html += '<div class="admin-stat-icon" style="background:' + s.bg + ';color:' + s.fg + '">';
    html += '<i data-lucide="' + s.icon + '"></i></div></div>';
    html += '<div class="admin-stat-value">' + s.count + '</div>';
    if (s.sub) html += '<div class="admin-stat-sub">' + s.sub + '</div>';
    html += '</a>';
  });
  html += '</div>';

  // Recent messages
  var msgs = AdminData.Messages.getAll().slice(0, 5);
  if (msgs.length) {
    html += '<div class="admin-table-wrap">';
    html += '<div class="admin-table-toolbar"><span style="font-weight:600;font-size:14px;color:var(--text)">Recent Messages</span></div>';
    html += '<table class="admin-table"><thead><tr>';
    html += '<th>From</th><th>Subject</th><th>Date</th><th>Status</th>';
    html += '</tr></thead><tbody>';
    msgs.forEach(function (m) {
      var statusClass = m.isRead ? "admin-status--draft" : "admin-status--published";
      var statusText = m.isRead ? "Read" : "Unread";
      html += '<tr><td data-label="From">' + AdminUtil.escapeHtml(m.name) + '</td>';
      html += '<td data-label="Subject">' + AdminUtil.escapeHtml(m.subject) + '</td>';
      html += '<td data-label="Date">' + AdminUtil.escapeHtml(m.date) + '</td>';
      html += '<td data-label="Status"><span class="admin-status ' + statusClass + '"><span class="admin-status-dot"></span>' + statusText + '</span></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }

  document.getElementById("dashboardContent").innerHTML = html;
  if (window.lucide) lucide.createIcons();
})();
</script>
</body>
</html>
