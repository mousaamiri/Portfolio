<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
<title>Portfolio — Blog</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);var l;try{l=localStorage.getItem('portfolio-lang')}catch(e){}if(l==='fa'){document.documentElement.setAttribute('dir','rtl');document.documentElement.setAttribute('lang','fa')}})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="../../shared/css/style.css" />
<link rel="stylesheet" href="../../shared/css/navbar.css" />
<link rel="stylesheet" href="../../shared/css/footer.css" />
<link rel="stylesheet" href="blog.css" />
<link rel="stylesheet" href="../../shared/css/rtl.css" />
<link rel="stylesheet" href="../../shared/css/spa-transitions.css" />
<link rel="stylesheet" href="../../shared/css/theme-switcher.css" />
</head>
<body>

<!-- Navbar placeholder — filled by navbar-component.js -->
<header class="navbar" id="navbar"></header>

<main id="page-content">
<section id="blog" class="blog-section">
  <div class="container">

    <!-- ================= HEADER ================= -->
    <div class="about-eyebrow-row">
      <span class="eyebrow">BLOG</span>
      <span class="eyebrow-rule" aria-hidden="true"></span>
    </div>
    <h2 class="blog-heading">THOUGHTS, SYSTEMS & ENGINEERING NOTES</h2>

    <!-- ================= SEARCH ================= -->
    <div class="blog-search-wrap">
      <svg class="blog-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="blog-search" id="blog-search" placeholder="Search articles.." autocomplete="off" spellcheck="false" />
    </div>

    <!-- ================= FILTERS ================= -->
    <div class="blog-filters" id="blog-filters" role="tablist" aria-label="Filter articles by category">
      <!-- Rendered by blog.js -->
    </div>

    <!-- ================= GRID ================= -->
    <div class="blog-grid" id="blog-grid">
      <!-- Rendered by blog.js -->
    </div>

  </div>
</section>

<!-- Blog modal is created/destroyed dynamically by blog.js -->
</main>

<!-- GSAP bundle -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/SplitText.min.js"></script>

<!-- Shared scripts -->
<script>
  window.__navConfig = { basePath: '../../', currentPage: 'blog' };
</script>
<script src="../../shared/js/translations.js"></script>
<script src="../../shared/js/i18n.js"></script>
<script src="../../shared/js/navbar-component.js"></script>
<script src="../../shared/js/text-reveal.js"></script>
<script src="blog.js"></script>
<script src="../../shared/js/navbar.js"></script>
<script src="../../shared/js/command-palette.js"></script>
<script src="../../shared/js/footer-component.js"></script>
<script src="../../shared/js/theme-switcher.js"></script>
<script src="../../shared/js/spa-router.js"></script>
<script>
  if (window.i18n) {
    window.i18n.translateElements();
    window.i18n.updateLangSwitcher();
  }
</script>
</body>
</html>
