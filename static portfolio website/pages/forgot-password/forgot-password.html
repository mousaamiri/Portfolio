<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
<title>Portfolio — Forgot Password</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);var l;try{l=localStorage.getItem('portfolio-lang')}catch(e){}if(l==='fa'){document.documentElement.setAttribute('dir','rtl');document.documentElement.setAttribute('lang','fa')}})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="../../shared/css/style.css" />
<link rel="stylesheet" href="forgot-password.css" />
<link rel="stylesheet" href="../../shared/css/rtl.css" />
</head>
<body data-i18n-title="forgot.title">

<main id="page-content">
<section class="forgot-section">
  <div class="forgot-bg-gradient" aria-hidden="true"></div>

  <div class="forgot-card" id="forgotCard">
    <!-- Step 1: Enter email -->
    <div class="forgot-step" id="forgotStep1">
      <!-- Back link -->
      <a href="../login/login.html" class="forgot-back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        <span data-i18n="forgot.back_to_login">Back to login</span>
      </a>

      <!-- Logo -->
      <div class="forgot-logo">
        <img id="forgotLogo" src="../../assets/logo-en-dark.svg" alt="Logo" class="forgot-logo-img" />
      </div>

      <h1 class="forgot-title" data-i18n="forgot.heading">Forgot Password?</h1>
      <p class="forgot-subtitle" data-i18n="forgot.subtitle">No worries! Enter your email and we'll send you a reset link.</p>

      <form class="forgot-form" id="forgotForm" novalidate>
        <div class="forgot-form-group" id="forgotEmailGroup">
          <label class="forgot-form-label" for="forgotEmail" data-i18n="forgot.email_label">EMAIL</label>
          <div class="forgot-input-wrap">
            <svg class="forgot-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="forgotEmail" name="email" class="forgot-input" placeholder="you@email.com" data-i18n-placeholder="forgot.email_placeholder" required autocomplete="email" />
          </div>
          <span class="forgot-error" id="forgotEmailError" aria-live="polite"></span>
        </div>

        <button type="submit" class="forgot-submit-btn" id="forgotSubmitBtn">
          <span class="forgot-submit-text" data-i18n="forgot.send_link">Send Reset Link</span>
          <span class="forgot-submit-spinner" aria-hidden="true"></span>
          <span class="forgot-submit-arrow">&rarr;</span>
        </button>
      </form>
    </div>

    <!-- Step 2: Success -->
    <div class="forgot-step forgot-step--hidden" id="forgotStep2">
      <!-- Success icon -->
      <div class="forgot-success-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="36" height="36">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <path d="m9 11 3 3L22 4"/>
        </svg>
      </div>

      <h2 class="forgot-title" data-i18n="forgot.check_email">Check Your Email</h2>
      <p class="forgot-subtitle" data-i18n="forgot.email_sent">We've sent a password reset link to your email address. Please check your inbox and follow the instructions.</p>

      <div class="forgot-email-badge" id="sentEmailBadge"></div>

      <p class="forgot-resend-text">
        <span data-i18n="forgot.didnt_receive">Didn't receive the email?</span>
        <button type="button" class="forgot-resend-btn" id="resendBtn" data-i18n="forgot.resend">Resend</button>
      </p>

      <a href="../login/login.html" class="forgot-back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        <span data-i18n="forgot.back_to_login">Back to login</span>
      </a>
    </div>
  </div>
</section>
</main>

<!-- Shared scripts (minimal — no navbar/footer) -->
<script src="../../shared/js/translations.js"></script>
<script src="../../shared/js/i18n.js"></script>
<script src="forgot-password.js"></script>
<script>
  if (window.i18n) {
    window.i18n.translateElements();
  }
</script>
</body>
</html>
