<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
<title>Portfolio — Login</title>
<script>
(function(){var t;try{t=localStorage.getItem('portfolio-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);var l;try{l=localStorage.getItem('portfolio-lang')}catch(e){}if(l==='fa'){document.documentElement.setAttribute('dir','rtl');document.documentElement.setAttribute('lang','fa')}})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="../../shared/css/style.css" />
<link rel="stylesheet" href="login.css" />
<link rel="stylesheet" href="../../shared/css/rtl.css" />
</head>
<body data-i18n-title="login.title">

<main id="page-content">
<section class="login-section">
  <div class="login-bg-gradient" aria-hidden="true"></div>

  <div class="login-card">
    <!-- Logo — switches by theme + language via JS -->
    <div class="login-logo">
      <img id="loginLogo" src="../../assets/logo-en-dark.svg" alt="Logo" class="login-logo-img" />
    </div>

    <h1 class="login-title" data-i18n="login.heading">Welcome Back</h1>
    <p class="login-subtitle" data-i18n="login.subtitle">Sign in to your account to continue</p>

    <form class="login-form" id="loginForm" novalidate>
      <!-- Email -->
      <div class="login-form-group" id="emailGroup">
        <label class="login-form-label" for="loginEmail" data-i18n="login.email_label">EMAIL</label>
        <div class="login-input-wrap">
          <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input type="email" id="loginEmail" name="email" class="login-input" placeholder="you@email.com" data-i18n-placeholder="login.email_placeholder" required autocomplete="email" />
        </div>
        <span class="login-error" id="emailError" aria-live="polite"></span>
      </div>

      <!-- Password -->
      <div class="login-form-group" id="passwordGroup">
        <label class="login-form-label" for="loginPassword" data-i18n="login.password_label">PASSWORD</label>
        <div class="login-input-wrap">
          <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="loginPassword" name="password" class="login-input login-input--password" placeholder="Enter your password" data-i18n-placeholder="login.password_placeholder" required autocomplete="current-password" />
          <button type="button" class="login-toggle-password" id="togglePassword" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
              <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
              <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
              <path d="m2 2 20 20"/>
            </svg>
          </button>
        </div>
        <span class="login-error" id="passwordError" aria-live="polite"></span>
      </div>

      <!-- Remember me + Forgot password -->
      <div class="login-options">
        <label class="login-checkbox-label">
          <input type="checkbox" id="rememberMe" class="login-checkbox" />
          <span class="login-checkbox-custom"></span>
          <span data-i18n="login.remember_me">Remember me</span>
        </label>
        <a href="../forgot-password/forgot-password.html" class="login-forgot-link" data-i18n="login.forgot_password">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="login-submit-btn" id="loginSubmitBtn">
        <span class="login-submit-text" data-i18n="login.sign_in">Sign In</span>
        <span class="login-submit-spinner" aria-hidden="true"></span>
        <span class="login-submit-arrow">&rarr;</span>
      </button>

      <!-- Form feedback -->
      <div class="login-form-feedback" id="loginFeedback" aria-live="polite"></div>
    </form>

  </div>
</section>
</main>

<!-- Shared scripts (minimal — no navbar/footer) -->
<script src="../../shared/js/translations.js"></script>
<script src="../../shared/js/i18n.js"></script>
<script src="login.js"></script>
<script>
  if (window.i18n) {
    window.i18n.translateElements();
  }
</script>
</body>
</html>
